{% extends "base.html" %}
{% block title %}Edit Student — MFCS Admin{% endblock %}
{% block navbar %}{% include 'admin/_navbar.html' %}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">Edit Student</h2>
  <a href="{{ url_for('admin.students', pid=pid or None, lang=lang or None, cult=cult or None) }}" class="btn btn-outline-secondary btn-sm">← Students</a>
</div>

<div class="card p-4" style="max-width:580px">
  <form method="post">
    <h6 class="text-uppercase text-muted small fw-600 mb-3" style="letter-spacing:.05em">Student Information</h6>
    <div class="row g-2 mb-3">
      <div class="col-6">
        <label class="form-label small fw-500">First Name *</label>
        <input type="text" name="first_name" class="form-control" required
               value="{{ student.first_name if student.first_name != '?' else '' }}">
      </div>
      <div class="col-6">
        <label class="form-label small fw-500">Last Name *</label>
        <input type="text" name="last_name" class="form-control" required
               value="{{ student.last_name if student.last_name != '?' else '' }}">
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label small fw-500">Chinese Name</label>
      <input type="text" name="chinese_name" class="form-control"
             value="{{ student.chinese_name if student.chinese_name != '?' else '' }}">
    </div>
    <div class="row g-2 mb-3">
      <div class="col-6">
        <label class="form-label small fw-500">Gender</label>
        <select name="gender" class="form-select">
          <option value="?">— Select —</option>
          <option value="M" {% if student.gender == 'M' %}selected{% endif %}>Male</option>
          <option value="F" {% if student.gender == 'F' %}selected{% endif %}>Female</option>
        </select>
      </div>
      <div class="col-6">
        <label class="form-label small fw-500">Date of Birth</label>
        <input type="date" name="birthday" class="form-control"
               value="{{ student.birthday if student.birthday and student.birthday|string not in ('2999-01-01','None') else '' }}">
      </div>
    </div>
    <div class="row g-2 mb-3">
      <div class="col-6">
        <label class="form-label small fw-500">Phone</label>
        <input type="tel" name="phone" class="form-control"
               value="{{ student.phone if student.phone != '?' else '' }}"
               pattern="\+?\(?\d[\d\s\-\.\(\)]{5,17}\d"
               title="Enter a valid phone number with at least 7 digits (e.g. 732-555-1234)">
      </div>
      <div class="col-6">
        <label class="form-label small fw-500">Email</label>
        <input type="email" name="email" class="form-control"
               value="{{ student.email if student.email not in ('?','') else '' }}">
      </div>
    </div>
    <h6 class="text-uppercase text-muted small fw-600 mb-3 mt-4" style="letter-spacing:.05em">Emergency Contact</h6>
    <div class="row g-2 mb-3">
      <div class="col-6">
        <label class="form-label small fw-500">First Name</label>
        <input type="text" name="ec_first_name" class="form-control"
               value="{{ student.ec_first_name if student.ec_first_name != '?' else '' }}">
      </div>
      <div class="col-6">
        <label class="form-label small fw-500">Last Name</label>
        <input type="text" name="ec_last_name" class="form-control"
               value="{{ student.ec_last_name if student.ec_last_name != '?' else '' }}">
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label small fw-500">Emergency Phone</label>
      <input type="tel" name="ec_phone" class="form-control"
             value="{{ student.ec_phone if student.ec_phone != '?' else '' }}"
               pattern="\+?\(?\d[\d\s\-\.\(\)]{5,17}\d"
               title="Enter a valid phone number with at least 7 digits (e.g. 732-555-1234)">
    </div>
    <h6 class="text-uppercase text-muted small fw-600 mb-3" style="letter-spacing:.05em">Special Notes</h6>
    <div class="mb-4">
      <textarea name="special_note" rows="4" class="form-control"
                placeholder="Medical conditions, allergies, photo/social media permission, etc.">{{ student.special_note or '' }}</textarea>
      <div class="form-text">Visible to all admin users.</div>
    </div>
    <input type="hidden" name="_pid"  value="{{ pid or '' }}">
    <input type="hidden" name="_lang" value="{{ lang or '' }}">
    <input type="hidden" name="_cult" value="{{ cult or '' }}">
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-admin px-4">Save Changes</button>
      <a href="{{ url_for('admin.students', pid=pid or None, lang=lang or None, cult=cult or None) }}"
         class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
