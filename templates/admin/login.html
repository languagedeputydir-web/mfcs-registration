{% extends "base.html" %}
{% block title %}Staff Login — Monmouth Fidelity Chinese School{% endblock %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:80vh">
  <div style="width:100%;max-width:380px">

    <div class="text-center mb-4">
      <img src="{{ url_for('static', filename='img/logo_transparent.png') }}"
           alt="MFCS Logo" style="height:80px;width:auto;" class="mb-3">
      <h5 class="mb-0" style="font-family:'DM Serif Display',serif">
        Monmouth Fidelity Chinese School
      </h5>
      <div class="text-muted small">維德孟華中文學校 · Since 1979</div>
      <h6 class="mt-3 mb-0 text-muted">Staff Portal</h6>
    </div>

    <div class="card p-4">
      <form method="post" action="{{ url_for('admin.login') }}">
        <div class="mb-3">
          <label class="form-label fw-500">Username</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-500">Password</label>
          <div class="input-group"><input type="password" name="password" class="form-control" required id="pw_8fa238"><button type="button" class="btn btn-outline-secondary" onclick="togglePw('pw_8fa238')" tabindex="-1">👁</button></div>
        </div>
        <button type="submit" class="btn btn-admin w-100">Sign In</button>
      </form>
    </div>

    <div class="text-center mt-3 small text-muted">
      <a href="{{ url_for('family.login') }}" class="text-decoration-none">← Family login</a>
    </div>

  </div>
</div>
{% endblock %}
