{% extends "base.html" %}
{% block title %}Forgot Password — MFCS
{% endblock %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:70vh">
  <div style="width:100%;max-width:420px">
    <h4 class="mb-1">Reset Your Password</h4>
    <p class="text-muted small mb-4">
      Enter the email address on your family account and we'll send you a reset link.
    </p>
    <div class="card p-4">
      <form method="post" action="{{ url_for('family.forgot_password') }}">
        <div class="mb-3">
          <label class="form-label fw-500">Email Address</label>
          <input type="email" name="email" class="form-control" required autofocus>
        </div>
        <button type="submit" class="btn btn-family w-100">Send Reset Link</button>
      </form>
    </div>
    <div class="text-center mt-3 small">
      <a href="{{ url_for('family.login') }}" class="text-decoration-none text-muted">← Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
