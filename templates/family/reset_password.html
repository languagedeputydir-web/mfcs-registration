{% extends "base.html" %}
{% block title %}Set New Password — MFCS{% endblock %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:70vh">
  <div style="width:100%;max-width:420px">
    <h4 class="mb-1">Set a New Password</h4>
    <p class="text-muted small mb-4">Choose a password that is at least 8 characters long.</p>
    <div class="card p-4">
      <form method="post" action="{{ url_for('family.reset_password', token=token) }}">
        <div class="mb-3">
          <label class="form-label fw-500">New Password</label>
          <div class="input-group"><input type="password" name="password" class="form-control" required autofocus
                 minlength="8" id="pw_82ab29"><button type="button" class="btn btn-outline-secondary" onclick="togglePw('pw_82ab29')" tabindex="-1">👁</button></div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-500">Confirm Password</label>
          <div class="input-group"><input type="password" name="confirm_password" class="form-control" required
                 minlength="8" id="pw_648688"><button type="button" class="btn btn-outline-secondary" onclick="togglePw('pw_648688')" tabindex="-1">👁</button></div>
        </div>
        <button type="submit" class="btn btn-family w-100">Update Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
